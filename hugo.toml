baseURL = 'https://fluidity.build/'
languageCode = 'en-us'
title = 'fluidity'
theme = 'hugo-bearblog'
enableRobotsTXT = true
disableKinds = ['taxonomy', 'term']
ignoreErrors = ['error-disable-taxonomy']

[params]
  title = 'fluidity'
  description = 'A local-first desktop development application for coordinating workspaces, tiles, git worktrees, and agent-assisted development.'
  favicon = 'favicon.svg'
  hideMadeWithLine = true

[markup]
  [markup.highlight]
    style = 'friendly'
    lineNos = false
    codeFences = true

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
